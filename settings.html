<div class="st-cycle-tracker-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Трекер цикла и беременности</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="setup_item">
                <div class="setup_item_label">Включить трекер</div>
                <input type="checkbox" id="st_cycle_tracker_enable">
            </div>

            <div class="setup_item">
                <div class="setup_item_label">Режим работы</div>
                <select id="st_cycle_tracker_mode" class="text_pole">
                    <option value="realism">Реализм (Стандарт)</option>
                    <option value="omegaverse">ОмегаВерс</option>
                </select>
            </div>

            <div class="setup_item">
                <div class="setup_item_label">Пол {{user}}</div>
                <select id="st_cycle_tracker_gender" class="text_pole">
                    <option value="female">Женщина</option>
                    <option value="male">Мужчина</option>
                </select>
            </div>

            <div class="setup_item">
                <div class="setup_item_label">Авто-зачатие (анализ чата)</div>
                <input type="checkbox" id="st_cycle_tracker_auto">
            </div>

            <div class="setup_item">
                <div class="setup_item_label">Передавать статус ИИ (Prompt)</div>
                <input type="checkbox" id="st_cycle_tracker_inject">
            </div>
            
            <div class="status_container">
                <div class="setup_item_label">Текущий статус {{user}}:</div>
                <div id="st_cycle_tracker_visual" class="st-cycle-tracker-visual"></div>
                <div id="st_cycle_tracker_status" class="st-cycle-tracker-status-value">Нет данных</div>
            </div>

            <div class="setup_item">
                <button id="st_cycle_tracker_set_period" class="menu_button">
                    <i class="fa-solid fa-calendar-plus"></i> Начать новый цикл
                </button>
            </div>

            <div class="setup_item">
                <button id="st_cycle_tracker_reset" class="menu_button">
                    <i class="fa-solid fa-trash-can"></i> Сбросить беременность
                </button>
            </div>

            <div class="info_box">
                <small><i class="fa-solid fa-info-circle"></i> Овуляция происходит на 12-16 день. Шанс зачатия учитывается только в фазу овуляции.</small>
            </div>
        </div>
    </div>
</div>
