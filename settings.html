<div class="st-cycle-tracker-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Трекер цикла и беременности</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="setup_item">
                <div class="setup_item_label">Включить трекер</div>
                <input type="checkbox" id="st_cycle_tracker_enable">
            </div>

            <div class="setup_item">
                <div class="setup_item_label">Женские гениталии ({{user}})</div>
                <input type="checkbox" id="st_cycle_tracker_female">
            </div>

            <div class="setup_item">
                <div class="setup_item_label">Авто-зачатие при сообщениях</div>
                <input type="checkbox" id="st_cycle_tracker_auto">
            </div>
            
            <div class="setup_item status_container">
                <div class="setup_item_label">Текущий статус:</div>
                <div id="st_cycle_tracker_status" style="font-weight: bold; color: var(--mainColor);">Нет данных</div>
            </div>

            <div class="setup_item">
                <button id="st_cycle_tracker_set_period" class="menu_button">Начать новый цикл (сегодня)</button>
            </div>

            <div class="setup_item">
                <button id="st_cycle_tracker_reset" class="menu_button">Сбросить беременность</button>
            </div>

            <div class="setup_item info_box">
                <small>Трекер использует реальное время. Овуляция происходит на 12-16 день цикла. Шанс зачатия учитывается только в фазу овуляции при включенном авто-зачатии.</small>
            </div>
        </div>
    </div>
</div>
